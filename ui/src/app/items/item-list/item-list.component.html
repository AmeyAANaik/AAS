<div class="item-page">
  <app-page-header title="Items" subtitle="Manage items category by category.">
    <button mat-flat-button color="primary" class="item-primary-action" (click)="openCreate()">
      <mat-icon>add</mat-icon>
      <span>Create item</span>
    </button>
  </app-page-header>

  <mat-card class="list-card">
    <mat-card-content>
      <div class="feedback loading" *ngIf="isLoadingItems">Loading items...</div>
      <div class="feedback error" *ngIf="!isLoadingItems && statusMessage">{{ statusMessage }}</div>

      <div class="table-toolbar" *ngIf="!isLoadingItems">
        <div class="table-meta">
          <div class="meta-title">{{ categoryRows.length }} categories</div>
          <div class="meta-subtitle">{{ items.length }} active items grouped by category.</div>
        </div>
        <div class="toolbar-actions">
          <mat-form-field class="search-field" appearance="outline">
            <mat-icon matPrefix>search</mat-icon>
            <mat-label>Search categories</mat-label>
            <input
              matInput
              type="text"
              [value]="searchTerm"
              (input)="applyFilter($any($event.target).value)"
              placeholder="Category name" />
          </mat-form-field>
          <button mat-icon-button color="primary" class="refresh-action" (click)="loadPageData()" [disabled]="isLoadingItems" aria-label="Refresh items">
            <mat-icon>refresh</mat-icon>
          </button>
        </div>
      </div>

      <div class="table-wrapper" *ngIf="!isLoadingItems && categoryRows.length; else emptyState">
        <table mat-table [dataSource]="categoryRows" class="mat-elevation-z1 pro-table">
          <ng-container matColumnDef="category">
            <th mat-header-cell *matHeaderCellDef>Category</th>
            <td mat-cell *matCellDef="let row">{{ row.name }}</td>
          </ng-container>

          <ng-container matColumnDef="count">
            <th mat-header-cell *matHeaderCellDef>No. items</th>
            <td mat-cell *matCellDef="let row">{{ row.itemCount }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let row" class="actions-cell">
              <button mat-icon-button color="primary" class="item-icon-button" type="button" (click)="openCategoryDialog(row.name)" aria-label="Manage category items">
                <mat-icon>edit</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>

      <ng-template #emptyState>
        <app-empty-state
          *ngIf="!isLoadingItems"
          icon="inventory"
          title="No categories found"
          message="No matching categories are available yet."
          hint="Create an item to start building category inventory.">
        </app-empty-state>
      </ng-template>
    </mat-card-content>
  </mat-card>
</div>
