<div class="branch-page">
  <app-page-header title="Branches" subtitle="Manage branch master data (shops).">
    <button mat-flat-button color="primary" (click)="clearSelection()">Create branch</button>
  </app-page-header>

  <div class="content-grid">
    <mat-card class="list-card">
      <mat-card-content>
        <div class="toolbar">
          <mat-form-field appearance="outline">
            <mat-label>Search branch</mat-label>
            <input matInput placeholder="Search by name or location" />
          </mat-form-field>
          <button mat-stroked-button color="primary" (click)="loadBranches()" [disabled]="isLoading">Refresh</button>
        </div>

      <div class="feedback loading" *ngIf="isLoading">Loading branches...</div>
      <div class="feedback error" *ngIf="!isLoading && statusMessage">{{ statusMessage }}</div>

      <div class="table-wrapper" *ngIf="!isLoading && branches.length; else emptyState">
        <table mat-table [dataSource]="branches" class="mat-elevation-z1 pro-table">
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Branch name</th>
            <td mat-cell *matCellDef="let branch">{{ branch.name }}</td>
          </ng-container>

          <ng-container matColumnDef="location">
            <th mat-header-cell *matHeaderCellDef>Location</th>
            <td mat-cell *matCellDef="let branch">{{ branch.location || '—' }}</td>
          </ng-container>

          <ng-container matColumnDef="whatsapp">
            <th mat-header-cell *matHeaderCellDef>WhatsApp Group</th>
            <td mat-cell *matCellDef="let branch">{{ branch.whatsappGroupName || '—' }}</td>
          </ng-container>

          <ng-container matColumnDef="creditDays">
            <th mat-header-cell *matHeaderCellDef>Credit days</th>
            <td mat-cell *matCellDef="let branch">{{ branch.creditDays ?? '—' }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let branch">
              <button mat-button class="table-action" color="primary" (click)="selectBranch(branch)">Manage</button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>
      <ng-template #emptyState>
        <app-empty-state
          *ngIf="!isLoading"
          icon="location_on"
          title="No branches found"
          message="No branches match your current filters."
          hint="Create a new branch to get started.">
        </app-empty-state>
      </ng-template>
      </mat-card-content>
    </mat-card>

    <mat-card class="form-card">
      <app-branch-form
        [branch]="selectedBranch"
        [isSaving]="isSaving"
        [statusMessage]="statusMessage"
        (save)="saveBranch($event)"
        (reset)="clearSelection()">
      </app-branch-form>
    </mat-card>
  </div>
</div>
