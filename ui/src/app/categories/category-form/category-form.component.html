<mat-card class="category-form-card">
  <mat-card-title>{{ category ? 'Edit category' : 'Create category' }}</mat-card-title>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-grid">
        <div class="form-section full">
          <div class="section-title">Category Details</div>
          <mat-form-field appearance="outline">
            <mat-label>Category name</mat-label>
            <input matInput formControlName="categoryName" />
            <mat-error *ngIf="form.get('categoryName')?.hasError('required')">Category name is required.</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Category code</mat-label>
            <input matInput formControlName="categoryCode" />
            <mat-error *ngIf="form.get('categoryCode')?.hasError('required')">Category code is required.</mat-error>
          </mat-form-field>
        </div>
      </div>

      <div class="form-actions">
        <button mat-raised-button color="primary" type="submit" [disabled]="isSaving || form.invalid">
          {{ category ? 'Update category' : 'Save category' }}
        </button>
        <button mat-stroked-button type="button" (click)="clear()">Cancel</button>
      </div>
      <div class="feedback form-status" *ngIf="statusMessage">{{ statusMessage }}</div>
    </form>
  </mat-card-content>
</mat-card>
